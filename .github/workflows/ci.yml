# Lightweight CI: frozen locks + prediction/report schemas + unit subset
# (no PE downloads, torch, or pycbc)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  locks-schema:
    name: Locks + schema + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e .

      - name: Lock residual + schema suite
        run: python scripts/ci_check.py

      - name: Pytest (CI subset)
        run: python scripts/ci_check.py --pytest

      - name: Upload CI report on failure
        if: failure()
        run: |
          python scripts/ci_check.py --json --out ci_report.json || true
          cat ci_report.json || true
